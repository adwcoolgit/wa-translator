name: CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: wa-translator-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  extension-build:
    name: Extension Build
    runs-on: windows-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install extension dependencies
        run: npm ci

      - name: Run extension typecheck
        run: npm run typecheck

      - name: Build extension package
        run: npm run build

      - name: Upload extension artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: extension-dist
          path: extension/dist
          if-no-files-found: error

  native-host-build:
    name: Native Host Build
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Build native host solution
        run: dotnet build native-host/WaTranslator.Host.sln -m:1 -p:UseSharedCompilation=false -v minimal

      - name: Publish native host artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: dotnet publish native-host/src/Host/WaTranslator.Host.csproj -c Release -o artifacts/native-host/host -p:UseSharedCompilation=false

      - name: Upload native host artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: native-host-publish
          path: artifacts/native-host/host
          if-no-files-found: error
